# The display name of this workflow, shown in the GitHub Actions UI
name: Deploy website

# Defines WHAT EVENTS trigger this workflow to run
on:
  # Trigger on any git push event
  push:
    # But ONLY when that push is to the 'main' branch
    branches:
      - main

# ------------------------------------------------------------------
# JOBS: Each job runs in a fresh, isolated virtual machine (runner)
# ------------------------------------------------------------------
jobs:

  # ==================== JOB 1: TEST ====================
  # This job runs tests and linting to verify code quality
  test:
    # Use the latest Ubuntu runner (fresh VM with Ubuntu Linux)
    runs-on: ubuntu-latest
    
    # STEPS: Commands and actions executed sequentially in this job
    steps:
      # STEP 1: Checkout (clone) the repository code into the runner
      - name: Get code
        uses: actions/checkout@v4  # Official GitHub action, v4 = latest stable

      # STEP 2: Cache npm dependencies to speed up future workflow runs
      - name: Cache dependencies
        uses: actions/cache@v4     # Official caching action
        with:
          # The folder where npm stores its global cache on Ubuntu
          path: ~/.npm
          # Cache KEY: a unique identifier for this cache entry
          # 'deps-node-modules-' is a static prefix
          # hashFiles('**/package-lock.json') generates a hash from the lock file
          # If package-lock.json changes → hash changes → cache miss → re-download
          # If it matches a previous run → cache hit → instant restore
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}

      # STEP 3: Install project dependencies using the lock file
      # 'npm ci' = "clean install", faster and stricter than 'npm install'
      # It uses the exact versions from package-lock.json
      - name: Install dependencies
        run: npm ci

      # STEP 4: Run ESLint to check code style and catch errors
      - name: Lint code
        run: npm run lint

      # STEP 5: Run the test suite (Vitest in this project)
      - name: Test code
        run: npm run test


  # ==================== JOB 2: BUILD ====================
  # This job compiles the production build
  # 'needs: test' means build will ONLY start AFTER the 'test' job succeeds
  build:
    needs: test
    runs-on: ubuntu-latest
    
    # OUTPUTS: Data this job can pass to downstream jobs that depend on it
    # Here we expose the hashed JS filename generated by Vite
    outputs:
      # 'script-file' is a custom name we chose
      # 'steps.publish.outputs.script-file' reads the output from the step with id='publish'
      script-file: ${{ steps.publish.outputs.script-file }}
    
    steps:
      # STEP 1: Checkout code again (each job starts with a clean VM, no shared files)
      - name: Get code
        uses: actions/checkout@v4

      # STEP 2: Restore npm cache (same key as the 'test' job)
      # This avoids re-downloading ~100MB of node_modules since 'test' already cached them
      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: deps-node-modules-${{ hashFiles('**/package-lock.json') }}

      # STEP 3: Install dependencies (cache hit = instant, cache miss = download)
      - name: Install dependencies
        run: npm ci

      # STEP 4: Build the production bundle using Vite
      # Creates the 'dist/' folder with optimized HTML/CSS/JS files
      - name: Build website
        run: npm run build

      # STEP 5: Capture the hashed JS filename to pass to the deploy job
      # Vite outputs files like 'assets/index-a3f7b2c1.js' (hash changes on every build)
      - name: Publish JS filename
        id: publish  # REQUIRED: gives this step an ID so we can reference its output above
        # 'find' searches dist/assets/ for any .js file
        # '-execdir echo ...' writes the found filename to GITHUB_OUTPUT
        # $GITHUB_OUTPUT is a special file GitHub reads to capture step outputs
        run: find dist/assets/*.js -type f -execdir echo 'script-file={}' >> $GITHUB_OUTPUT ';'

      # STEP 6: Upload the built 'dist/' folder as a workflow artifact
      # Artifacts persist files between jobs (since each job has its own VM)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4  # v4 is the current supported version
        with:
          name: dist-files       # The name we give this artifact (used when downloading)
          path: dist             # The folder to upload (contains index.html, assets/, etc.)
          # The commented block below shows how to upload multiple paths if needed:
          # path: |
          #   dist
          #   package.json


  # ==================== JOB 3: DEPLOY ====================
  # This job simulates deployment
  # 'needs: build' means deploy only runs after 'build' succeeds
  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      # STEP 1: Download the artifact that the 'build' job uploaded
      # This restores the 'dist/' folder into this fresh VM
      - name: Get build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files  # Must match the 'name:' used in upload-artifact

      # STEP 2: List the downloaded files to verify the artifact arrived correctly
      - name: Output contents
        run: ls -al  # 'ls -al' = list all files with details

      # STEP 3: Print the JS filename that was captured in the build job
      # 'needs.build.outputs.script-file' accesses the job output defined in 'build:'
      - name: Output fileName
        run: echo "${{ needs.build.outputs.script-file }}"

      # STEP 4: Placeholder for actual deployment logic
      # In a real project, this might be: aws s3 sync, rsync, netlify deploy, etc.
      - name: Deploy
        run: echo "Deploying..."